name: Cleanup Deleted Branch

on:
    delete:

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    cleanup:
        if: github.event.ref_type == 'branch'
        runs-on: ubuntu-latest
        steps:
            - name: Extract deleted branch name
              id: extract_branch
              run: echo "branch=${{ github.event.ref }}" >> $GITHUB_OUTPUT

            - name: Checkout root repository (for git ls-remote)
              uses: actions/checkout@v7

            - name: Checkout gh-pages
              uses: actions/checkout@v7
              with:
                  ref: gh-pages
                  path: gh-pages-dir
              continue-on-error: true

            - name: Cleanup branch and Generate branches.html
              run: |
                  BRANCH="${{ steps.extract_branch.outputs.branch }}"

                  # 1. Remove branch directory if it exists
                  if [ -d "gh-pages-dir/$BRANCH" ]; then
                      echo "Removing directory for branch: $BRANCH"
                      rm -rf "gh-pages-dir/$BRANCH"
                  else
                      echo "No deployed directory found for branch: $BRANCH"
                  fi

                  # 2. Generate branches.html directly in gh-pages-dir
                  echo "<!DOCTYPE html><html><head><title>Deployed Branches</title><style>body{font-family:sans-serif;margin:2rem;background:#1F2F3F;color:#fff;}a{color:#4da6ff;text-decoration:none;}a:hover{text-decoration:underline;}ul{list-style-type:none;padding:0;}li{margin:0.5rem 0;padding:1rem;background:#2a3f54;border-radius:8px;}</style></head><body>" > ./gh-pages-dir/branches.html
                  echo "<h1>Hide and Seek - Deployed Branches</h1><ul>" >> ./gh-pages-dir/branches.html
                  echo "<li><a href='./'>master (Root)</a></li>" >> ./gh-pages-dir/branches.html

                  git ls-remote --heads origin | awk -F'refs/heads/' '{print $2}' > active_branches.txt

                  # Clean carriage returns just in case
                  sed -i 's/\r$//' active_branches.txt

                  if [ -d "gh-pages-dir" ]; then
                      while IFS= read -r branch; do
                          # Ignore master and gh-pages
                          if [ "$branch" != "master" ] && [ "$branch" != "gh-pages" ]; then
                              # Check if directory exists for this active branch
                              if [ -d "gh-pages-dir/$branch" ]; then
                                  # Also ignore if branch name starts with _ or ~
                                  if [[ ! "$branch" == _* ]] && [[ ! "$branch" == ~* ]]; then
                                      echo "<li><a href='./$branch/'>$branch</a></li>" >> ./gh-pages-dir/branches.html
                                  fi
                              fi
                          fi
                      done < active_branches.txt
                  fi

                  echo "</ul></body></html>" >> ./gh-pages-dir/branches.html

                  touch ./gh-pages-dir/.nojekyll

                  # 3. Commit and Push everything together
                  cd gh-pages-dir
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "Cleanup deployed files and update branches.html for deleted branch: $BRANCH" || echo "No changes to commit"
                  git push origin gh-pages
