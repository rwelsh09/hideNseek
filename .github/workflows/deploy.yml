name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master
            - "**"
            - "!dependabot/**"
    delete:
    workflow_dispatch:

concurrency:
    group: "deploy-and-cleanup"
    cancel-in-progress: false

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build-and-deploy:
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'delete' && github.event.ref_type == 'branch')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout your repository using git
              uses: actions/checkout@v7

            - name: Extract branch name
              shell: bash
              run: |
                  if [ "${{ github.event_name }}" == "delete" ]; then
                      echo "branch=${{ github.event.ref }}" >> $GITHUB_OUTPUT
                  else
                      echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
                  fi
              id: extract_branch

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10.30.3

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              if: github.event_name != 'delete'
              run: pnpm install --frozen-lockfile

            - name: Run tests
              if: github.event_name != 'delete'
              run: pnpm test

            - name: Build site
              if: github.event_name != 'delete'
              env:
                  BRANCH_NAME: ${{ steps.extract_branch.outputs.branch }}
              run: pnpm run build

            - name: Checkout gh-pages
              uses: actions/checkout@v7
              with:
                  ref: gh-pages
                  path: gh-pages-dir
              continue-on-error: true

            - name: Prepare deployment and Generate branches.html
              run: |
                  # 1. Ensure gh-pages-dir exists (e.g. initial run)
                  if [ ! -d "gh-pages-dir/.git" ]; then
                      mkdir -p gh-pages-dir
                      cd gh-pages-dir
                      git init
                      git checkout -b gh-pages
                      git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                      cd ..
                  fi

                  BRANCH="${{ steps.extract_branch.outputs.branch }}"

                  # Get active branches before modifying directories
                  git ls-remote --heads origin | awk -F'refs/heads/' '{print $2}' > active_branches.txt
                  # Clean carriage returns just in case
                  sed -i 's/\r$//' active_branches.txt

                  # 2. Copy the built site to the target directory
                  if [ "${{ github.event_name }}" == "delete" ]; then
                      if [ -d "gh-pages-dir/$BRANCH" ]; then
                          echo "Removing directory for deleted branch: $BRANCH"
                          rm -rf "gh-pages-dir/$BRANCH"
                      fi
                  elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                      echo "Running manual bulk cleanup..."
                      cd gh-pages-dir
                      find . -name "sw.js" | sed 's|^\./||' | sed 's|/sw\.js$||' | sed 's|^sw\.js$||' > ../deployed_branches.txt
                      while IFS= read -r DIRPATH; do
                          if [ -z "$DIRPATH" ]; then continue; fi
                          if ! grep -xq "$DIRPATH" ../active_branches.txt; then
                              echo "Directory '$DIRPATH' does not match any active branch. Removing..."
                              rm -rf "$DIRPATH"
                          fi
                      done < ../deployed_branches.txt
                      find . -type d -empty -not -path "./.git/*" -delete || true
                      cd ..
                  else
                      if [ "$BRANCH" == "master" ]; then
                          # Clean up obsolete files and deleted branches in gh-pages root
                          # We preserve active branches and the .git directory
                          mkdir -p safe_branches
                          while IFS= read -r active_branch; do
                              if [ "$active_branch" != "master" ] && [ "$active_branch" != "gh-pages" ]; then
                                  if [ -d "gh-pages-dir/$active_branch" ]; then
                                      mkdir -p "safe_branches/$(dirname "$active_branch")"
                                      mv "gh-pages-dir/$active_branch" "safe_branches/$(dirname "$active_branch")/"
                                  fi
                              fi
                          done < active_branches.txt

                          cd gh-pages-dir
                          find . -maxdepth 1 -mindepth 1 ! -name '.git' -exec rm -rf {} +
                          cd ..

                          # Copy the new master build
                          cp -R ./dist/* gh-pages-dir/

                          # Restore active branches
                          if [ -d "safe_branches" ] && [ "$(ls -A safe_branches)" ]; then
                              cp -R safe_branches/* gh-pages-dir/
                              rm -rf safe_branches
                          fi
                      else
                          mkdir -p "gh-pages-dir/$BRANCH"
                          # Remove old files for this branch specifically
                          rm -rf "gh-pages-dir/$BRANCH"/*
                          cp -R ./dist/* "gh-pages-dir/$BRANCH/"
                      fi
                  fi

                  touch gh-pages-dir/.nojekyll

                  # 3. Generate branches.html
                  echo "<!DOCTYPE html><html><head><title>Deployed Branches</title><style>body{font-family:sans-serif;margin:2rem;background:#1F2F3F;color:#fff;}a{color:#4da6ff;text-decoration:none;}a:hover{text-decoration:underline;}ul{list-style-type:none;padding:0;}li{margin:0.5rem 0;padding:1rem;background:#2a3f54;border-radius:8px;}</style></head><body>" > ./gh-pages-dir/branches.html
                  echo "<h1>Hide 'n' Seek - Deployed Branches</h1><ul>" >> ./gh-pages-dir/branches.html
                  echo "<li><a href='./'>master (Root)</a></li>" >> ./gh-pages-dir/branches.html
                  if [ -d "gh-pages-dir" ]; then
                      while IFS= read -r branch; do
                          # Ignore master and gh-pages
                          if [ "$branch" != "master" ] && [ "$branch" != "gh-pages" ]; then
                              # Check if directory exists for this active branch
                              if [ -d "gh-pages-dir/$branch" ]; then
                                  # Also ignore if branch name starts with _ or ~ or dependabot/
                                  if [[ ! "$branch" == _* && ! "$branch" == ~* && ! "$branch" == dependabot/* ]]; then
                                      echo "<li><a href='./$branch/'>$branch</a></li>" >> ./gh-pages-dir/branches.html
                                  fi
                              fi
                          fi
                      done < active_branches.txt
                  fi

                  echo "</ul></body></html>" >> ./gh-pages-dir/branches.html

                  # 4. Commit and Push
                  cd gh-pages-dir
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .

                  if [ "${{ github.event_name }}" == "delete" ]; then
                      git commit -m "Cleanup deployed files for deleted branch: $BRANCH" || echo "No changes to commit"
                  elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                      git commit -m "Bulk cleanup of orphaned deployed branches" || echo "No changes to commit"
                  else
                      git commit -m "Deploy branch $BRANCH" || echo "No changes to commit"
                  fi

                  for i in 1 2 3 4 5; do
                      git pull --rebase origin gh-pages || true
                      if git push origin gh-pages; then
                          break
                      fi
                      if [ $i -eq 5 ]; then
                          echo "Failed to push after 5 attempts."
                          exit 1
                      fi
                      echo "Push failed, retrying in 5 seconds..."
                      sleep 5
                  done
