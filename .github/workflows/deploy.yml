name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master
            - "**"
    workflow_dispatch:

concurrency:
    group: "deploy"
    cancel-in-progress: false

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout your repository using git
              uses: actions/checkout@v7

            - name: Extract branch name
              shell: bash
              run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
              id: extract_branch

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10.30.3

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test

            - name: Build site
              env:
                  BRANCH_NAME: ${{ steps.extract_branch.outputs.branch }}
              run: pnpm run build

            - name: Checkout gh-pages
              uses: actions/checkout@v7
              with:
                  ref: gh-pages
                  path: gh-pages-dir
              continue-on-error: true

            - name: Prepare deployment and Generate branches.html
              run: |
                  # 1. Ensure gh-pages-dir exists (e.g. initial run)
                  if [ ! -d "gh-pages-dir/.git" ]; then
                      mkdir -p gh-pages-dir
                      cd gh-pages-dir
                      git init
                      git checkout -b gh-pages
                      git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                      cd ..
                  fi

                  BRANCH="${{ steps.extract_branch.outputs.branch }}"

                  # Get active branches before modifying directories
                  git ls-remote --heads origin | awk -F'refs/heads/' '{print $2}' > active_branches.txt
                  # Clean carriage returns just in case
                  sed -i 's/\r$//' active_branches.txt

                  # 2. Copy the built site to the target directory
                  if [ "$BRANCH" == "master" ]; then
                      # Clean up obsolete files and deleted branches in gh-pages root
                      # We preserve active branches and the .git directory

                      cd gh-pages-dir
                      for item in * .[!.]* ..?*; do
                          # Skip special directories
                          if [ "$item" = "." ] || [ "$item" = ".." ] || [ "$item" = ".git" ]; then
                              continue
                          fi

                          # If it's a directory, check if it's an active branch
                          if [ -d "$item" ]; then
                              if ! grep -q "^${item}$" ../active_branches.txt; then
                                  echo "Removing obsolete branch directory: $item"
                                  rm -rf "$item"
                              fi
                          else
                              # It's a file, remove it so fresh master build replaces it
                              echo "Removing obsolete file: $item"
                              rm -f "$item"
                          fi
                      done
                      cd ..

                      # Copy the new master build
                      cp -R ./dist/* gh-pages-dir/
                  else
                      mkdir -p "gh-pages-dir/$BRANCH"
                      # Remove old files for this branch specifically
                      rm -rf "gh-pages-dir/$BRANCH"/*
                      cp -R ./dist/* "gh-pages-dir/$BRANCH/"
                  fi

                  touch gh-pages-dir/.nojekyll

                  # 3. Generate branches.html
                  echo "<!DOCTYPE html><html><head><title>Deployed Branches</title><style>body{font-family:sans-serif;margin:2rem;background:#1F2F3F;color:#fff;}a{color:#4da6ff;text-decoration:none;}a:hover{text-decoration:underline;}ul{list-style-type:none;padding:0;}li{margin:0.5rem 0;padding:1rem;background:#2a3f54;border-radius:8px;}</style></head><body>" > ./gh-pages-dir/branches.html
                  echo "<h1>Hide 'n' Seek - Deployed Branches</h1><ul>" >> ./gh-pages-dir/branches.html
                  echo "<li><a href='./'>master (Root)</a></li>" >> ./gh-pages-dir/branches.html
                  if [ -d "gh-pages-dir" ]; then
                      while IFS= read -r branch; do
                          # Ignore master and gh-pages
                          if [ "$branch" != "master" ] && [ "$branch" != "gh-pages" ]; then
                              # Check if directory exists for this active branch
                              if [ -d "gh-pages-dir/$branch" ]; then
                                  # Also ignore if branch name starts with _ or ~
                                  if [[ ! "$branch" == _* && ! "$branch" == ~* ]]; then
                                      echo "<li><a href='./$branch/'>$branch</a></li>" >> ./gh-pages-dir/branches.html
                                  fi
                              fi
                          fi
                      done < active_branches.txt
                  fi

                  echo "</ul></body></html>" >> ./gh-pages-dir/branches.html

                  # 4. Commit and Push
                  cd gh-pages-dir
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "Deploy branch $BRANCH" || echo "No changes to commit"
                  for i in {1..5}; do
                      git pull --rebase origin gh-pages && git push origin gh-pages && break
                      if [ $i -eq 5 ]; then exit 1; fi
                      sleep 5
                  done
