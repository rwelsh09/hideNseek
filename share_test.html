<!DOCTYPE html>
<html>
<body>
<button onclick="share()">Share</button>
<script>
async function share() {
    try {
        await navigator.share({
            url: "https://example.com",
            text: "Hello World",
            title: "Test Share"
        });
        console.log("Shared successfully");
    } catch (e) {
        console.error("Share failed", e);
    }
}
</script>
</body>
</html>
